<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#cdeef8">
  <meta name="theme-color" content="#06293c" media="(prefers-color-scheme: dark)">
  <title>{{ t('login.page_title') }}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>🫧</text></svg>">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <main class="login">
    <form class="login-card" method="post" action="/login">
      <h1>🫧 {{ t('login.title') }}</h1>
      {% if error %}<p class="login-err">{{ t('login.bad') }}</p>{% endif %}
      <input type="password" name="password" placeholder="{{ t('login.placeholder') }}" autofocus
             autocomplete="current-password" inputmode="text">
      <button type="submit">{{ t('login.submit') }}</button>
      <p class="lang-switcher">
        {% for code in LANGS %}
          <a href="?lang={{ code }}"{% if code == lang %} class="active"{% endif %}>{{ t('lang.switcher.' ~ code) }}</a>
        {% endfor %}
      </p>
    </form>
  </main>
</body>
</html>
